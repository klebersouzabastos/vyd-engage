databases:
  - name: vyd-engage-db
    plan: free
    databaseName: vyd_engage
    user: vyd_engage_user

  - name: vyd-engage-redis
    plan: free
    ipAllowList: []

services:
  - type: web
    plan: free
    name: vyd-engage-api
    runtime: node
    rootDir: server
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/index.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: JWT_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: FRONTEND_URL
        value: https://engage.vydhub.com
      - key: ALLOWED_ORIGINS
        value: https://engage.vydhub.com
      - key: ENABLE_BILLING_JOBS
        value: "false"
      - key: ENABLE_AUTOMATION_ENGINE
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: vyd-engage-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: vyd-engage-redis
          type: redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "VYD Engage <noreply@engage.vydhub.com>"
