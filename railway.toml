[build]
builder = "nixpacks"
# --include=dev é obrigatório: NODE_ENV=production no Railway faz npm pular devDeps
# (prisma CLI, typescript, tsx) que são necessárias no build/start.
buildCommand = "cd server && npm ci --include=dev && ./node_modules/.bin/prisma generate && npm run build"

[deploy]
# `migrate deploy` é seguro agora — todas as 11 migrations originais foram
# marcadas como applied via `prisma migrate resolve` (banco já estava em sync
# via db push). Daqui em diante, novas migrations funcionam normalmente.
startCommand = "cd server && ./node_modules/.bin/prisma migrate deploy && node dist/index.js"
healthcheckPath = "/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
