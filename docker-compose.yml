version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: flowcrm-postgres
    environment:
      POSTGRES_USER: flowcrm
      POSTGRES_PASSWORD: flowcrm_dev_password
      POSTGRES_DB: flowcrm
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flowcrm"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: flowcrm-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:







